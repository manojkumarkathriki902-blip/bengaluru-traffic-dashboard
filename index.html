<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bengaluru Traffic Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0d14;
  --surface:#111520;
  --surface2:#161c2e;
  --border:#1e2a42;
  --accent:#00d4ff;
  --accent2:#ff4d6d;
  --amber:#ffb347;
  --green:#39ff8a;
  --text:#e8edf5;
  --muted:#6b7a99;
  --red-glow:rgba(255,77,109,0.15);
  --amber-glow:rgba(255,179,71,0.12);
  --green-glow:rgba(57,255,138,0.1);
  --blue-glow:rgba(0,212,255,0.12);
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* Animated grid background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

.app{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:12px 20px;
  background:rgba(17,21,32,0.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.logo{
  font-family:'Space Mono',monospace;
  font-size:13px;font-weight:700;
  color:var(--accent);
  letter-spacing:1px;
  white-space:nowrap;
}
.logo span{color:var(--muted);}
.live-badge{
  display:flex;align-items:center;gap:6px;
  font-family:'Space Mono',monospace;
  font-size:10px;color:var(--accent2);
  border:1px solid var(--accent2);
  padding:3px 10px;border-radius:2px;
  animation:pulse-border 2s infinite;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,0.4)}50%{box-shadow:0 0 0 4px rgba(255,77,109,0)}}
.topbar-stats{display:flex;gap:20px;margin-left:auto;}
.ts-item{text-align:center;}
.ts-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;line-height:1;}
.ts-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.ts-val.red{color:var(--accent2);}
.ts-val.amber{color:var(--amber);}
.ts-val.green{color:var(--green);}
.ts-val.blue{color:var(--accent);}

/* ── MAIN LAYOUT ── */
.main{display:grid;grid-template-columns:1fr 320px;gap:0;height:calc(100vh - 57px);}

/* ── MAP PANEL ── */
.map-panel{position:relative;overflow:hidden;background:#0d1118;}
#map-svg{width:100%;height:100%;}

/* Road network */
.road{stroke:#1e2a42;fill:none;}
.road-main{stroke-width:8;stroke:#1a2235;}
.road-sec{stroke-width:4;stroke:#141c2e;}

/* Heatmap blobs */
.heat-blob{opacity:0;transition:opacity 0.8s;}
.heat-blob.visible{opacity:1;}

/* Junction markers */
.junction-ring{
  cursor:pointer;
  transition:all 0.3s;
}
.junction-ring:hover .ring-outer{stroke-width:3;}
.junction-ring.selected .ring-outer{stroke-width:4;}

.ring-outer{fill:none;stroke-width:1.5;opacity:0.6;}
.ring-inner{opacity:0.9;}
.ring-pulse{fill:none;animation:ring-expand 2s ease-out infinite;}
@keyframes ring-expand{
  0%{r:14;opacity:0.8;stroke-width:2;}
  100%{r:30;opacity:0;stroke-width:0.5;}
}

/* Junction label tooltip */
.junction-label{
  pointer-events:none;
  font-family:'Space Mono',monospace;
  font-size:9px;
  fill:var(--text);
}

/* Map title overlay */
.map-overlay-title{
  position:absolute;top:16px;left:16px;
  font-family:'Space Mono',monospace;
  font-size:11px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
}
.map-legend{
  position:absolute;bottom:16px;left:16px;
  display:flex;flex-direction:column;gap:6px;
}
.legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.legend-dot{width:10px;height:10px;border-radius:50%;}

/* ── SIDE PANEL ── */
.side{
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* AI Suggestion banner */
.ai-banner{
  background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(0,212,255,0.03));
  border-bottom:1px solid rgba(0,212,255,0.2);
  padding:14px 16px;
  position:relative;
  overflow:hidden;
}
.ai-banner::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:scan 3s linear infinite;
}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.ai-label{
  font-family:'Space Mono',monospace;font-size:9px;
  color:var(--accent);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.ai-label::before{content:'◈';font-size:10px;}
.ai-junction{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px;}
.ai-reason{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.ai-recommend{
  display:flex;align-items:center;justify-content:space-between;
}
.ai-count{
  font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);
}
.btn-deploy{
  background:var(--accent2);
  color:#fff;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:7px 16px;border-radius:3px;
  transition:all 0.2s;
  letter-spacing:0.5px;
}
.btn-deploy:hover{background:#ff2d55;transform:translateY(-1px);}
.btn-deploy:active{transform:translateY(0);}

/* Alerts list */
.alerts-section{
  padding:12px 16px 8px;
  border-bottom:1px solid var(--border);
}
.section-title{
  font-family:'Space Mono',monospace;font-size:9px;
  color:var(--muted);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:10px;
}
.alert-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 0;
  border-bottom:1px solid rgba(30,42,66,0.5);
  cursor:pointer;
  transition:background 0.2s;
  border-radius:4px;
  padding:8px 6px;
}
.alert-item:hover{background:rgba(255,255,255,0.03);}
.alert-item:last-child{border-bottom:none;}
.alert-dot{
  width:8px;height:8px;border-radius:50%;
  margin-top:4px;flex-shrink:0;
}
.alert-info{flex:1;}
.alert-name{font-size:13px;font-weight:500;color:var(--text);}
.alert-detail{font-size:11px;color:var(--muted);margin-top:1px;}
.alert-tag{
  font-family:'Space Mono',monospace;font-size:9px;
  padding:2px 6px;border-radius:2px;
  white-space:nowrap;align-self:flex-start;margin-top:2px;
}
.tag-high{background:rgba(255,77,109,0.15);color:var(--accent2);border:1px solid rgba(255,77,109,0.3);}
.tag-med{background:rgba(255,179,71,0.15);color:var(--amber);border:1px solid rgba(255,179,71,0.3);}
.tag-low{background:rgba(57,255,138,0.1);color:var(--green);border:1px solid rgba(57,255,138,0.25);}

/* Junction detail panel */
.detail-panel{
  flex:1;overflow-y:auto;padding:12px 16px;
  display:none;
}
.detail-panel.visible{display:block;}
.detail-header{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.detail-back{
  background:none;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;font-size:12px;padding:4px 10px;border-radius:3px;
  transition:all 0.2s;
}
.detail-back:hover{border-color:var(--accent);color:var(--accent);}
.detail-name{font-size:18px;font-weight:600;}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.detail-stat{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:10px 12px;
}
.detail-stat-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;}
.detail-stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
.deploy-form{margin-top:8px;}
.deploy-label{font-size:12px;color:var(--muted);margin-bottom:8px;display:block;}
.officer-slider{width:100%;accent-color:var(--accent);margin-bottom:12px;}
.btn-confirm{
  width:100%;background:var(--accent2);color:#fff;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;padding:12px;border-radius:4px;
  transition:all 0.2s;letter-spacing:0.5px;
}
.btn-confirm:hover{background:#ff2d55;}

/* Officers list in detail */
.officers-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.officer-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:8px 10px;font-size:11px;
}
.officer-name{font-weight:500;color:var(--text);}
.officer-badge{color:var(--muted);}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--green);color:#0a0d14;
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
  padding:12px 24px;border-radius:4px;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.alert-item{animation:fadeIn 0.4s ease both;}
.alert-item:nth-child(1){animation-delay:0.05s}
.alert-item:nth-child(2){animation-delay:0.1s}
.alert-item:nth-child(3){animation-delay:0.15s}
.alert-item:nth-child(4){animation-delay:0.2s}
.alert-item:nth-child(5){animation-delay:0.25s}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">BLR<span>/</span>TRAFFIC<span>/</span>CMD</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="topbar-stats">
      <div class="ts-item"><div class="ts-val red" id="stat-high">0</div><div class="ts-label">Critical</div></div>
      <div class="ts-item"><div class="ts-val amber" id="stat-med">0</div><div class="ts-label">Medium</div></div>
      <div class="ts-item"><div class="ts-val green" id="stat-clear">0</div><div class="ts-label">Clear</div></div>
      <div class="ts-item"><div class="ts-val blue" id="stat-officers">0</div><div class="ts-label">Deployed</div></div>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- MAP -->
    <div class="map-panel">
      <div class="map-overlay-title">Bengaluru — live traffic heatmap</div>

      <svg id="map-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
        <!-- Road network (simplified Bengaluru grid) -->
        <!-- Outer ring roads -->
        <ellipse cx="400" cy="300" rx="280" ry="220" class="road road-main"/>
        <!-- ORR approximation -->
        <ellipse cx="400" cy="300" rx="180" ry="140" class="road road-sec" stroke-dasharray="6 3"/>

        <!-- Main arterials -->
        <line x1="400" y1="40" x2="400" y2="560" class="road road-main"/>
        <line x1="80" y1="300" x2="720" y2="300" class="road road-main"/>
        <line x1="150" y1="100" x2="650" y2="500" class="road road-sec"/>
        <line x1="650" y1="100" x2="150" y2="500" class="road road-sec"/>
        <line x1="200" y1="40" x2="200" y2="560" class="road road-sec" opacity="0.5"/>
        <line x1="600" y1="40" x2="600" y2="560" class="road road-sec" opacity="0.5"/>
        <line x1="80" y1="180" x2="720" y2="180" class="road road-sec" opacity="0.5"/>
        <line x1="80" y1="420" x2="720" y2="420" class="road road-sec" opacity="0.5"/>

        <!-- Heatmap blobs (drawn per junction) -->
        <g id="heatmap-layer"></g>
        <!-- Junction markers -->
        <g id="junction-layer"></g>
      </svg>

      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#ff4d6d;"></div>High congestion</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffb347;"></div>Medium</div>
        <div class="legend-item"><div class="legend-dot" style="background:#39ff8a;"></div>Clear</div>
      </div>
    </div>

    <!-- SIDE PANEL -->
    <aside class="side">

      <!-- AI Suggestion -->
      <div class="ai-banner">
        <div class="ai-label">AI Recommendation</div>
        <div class="ai-junction" id="ai-junction">—</div>
        <div class="ai-reason" id="ai-reason">Analyzing traffic patterns...</div>
        <div class="ai-recommend">
          <div class="ai-count" id="ai-count">—</div>
          <button class="btn-deploy" id="btn-ai-deploy">Deploy Now</button>
        </div>
      </div>

      <!-- Live Alerts -->
      <div class="alerts-section">
        <div class="section-title">Live junction alerts</div>
        <div id="alerts-list"></div>
      </div>

      <!-- Junction detail (shown on click) -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
          <button class="detail-back" id="btn-back">← Back</button>
          <div class="detail-name" id="detail-name"></div>
        </div>
        <div class="detail-stats">
          <div class="detail-stat">
            <div class="detail-stat-val" id="detail-vehicles" style="color:var(--accent2);">—</div>
            <div class="detail-stat-label">Vehicles</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val" id="detail-status" style="color:var(--amber);">—</div>
            <div class="detail-stat-label">Status</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val" id="detail-deployed" style="color:var(--accent);">—</div>
            <div class="detail-stat-label">Deployed</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val" id="detail-wait">—</div>
            <div class="detail-stat-label">Wait (min)</div>
          </div>
        </div>

        <div class="deploy-form">
          <label class="deploy-label">Officers to send: <strong id="slider-val" style="color:var(--accent);">2</strong></label>
          <input type="range" class="officer-slider" id="officer-slider" min="1" max="6" value="2"/>
          <button class="btn-confirm" id="btn-confirm-deploy">Confirm Deployment</button>
        </div>
      </div>

    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const JUNCTIONS = [
  {id:'silk_board',  name:'Silk Board',      x:420, y:370, level:2, vehicles:1240, deployed:0, wait:18},
  {id:'marathahalli',name:'Marathahalli',    x:600, y:310, level:2, vehicles:980,  deployed:0, wait:14},
  {id:'hebbal',      name:'Hebbal',          x:390, y:115, level:1, vehicles:620,  deployed:1, wait:9},
  {id:'rajajinagar', name:'Rajajinagar',     x:200, y:260, level:1, vehicles:540,  deployed:0, wait:7},
  {id:'electronic',  name:'Electronic City', x:420, y:500, level:1, vehicles:490,  deployed:1, wait:8},
  {id:'yeshwantpur', name:'Yeshwantpur',     x:200, y:180, level:0, vehicles:210,  deployed:0, wait:2},
  {id:'jayanagar',   name:'Jayanagar',       x:290, y:410, level:0, vehicles:180,  deployed:0, wait:2},
  {id:'whitefield',  name:'Whitefield',      x:650, y:200, level:0, vehicles:240,  deployed:0, wait:3},
  {id:'koramangala', name:'Koramangala',     x:490, y:420, level:1, vehicles:560,  deployed:0, wait:8},
  {id:'mg_road',     name:'MG Road',         x:440, y:295, level:1, vehicles:440,  deployed:1, wait:6},
];

const COLOR = {
  2: {fill:'#ff4d6d', stroke:'#ff2d55', glow:'rgba(255,77,109,0.25)', tag:'tag-high', label:'HIGH'},
  1: {fill:'#ffb347', stroke:'#ff9500', glow:'rgba(255,179,71,0.2)',  tag:'tag-med',  label:'MED'},
  0: {fill:'#39ff8a', stroke:'#00cc5a', glow:'rgba(57,255,138,0.15)', tag:'tag-low',  label:'CLEAR'},
};

let selectedJunction = null;

function buildMap() {
  const heatLayer = document.getElementById('heatmap-layer');
  const jLayer = document.getElementById('junction-layer');

  JUNCTIONS.forEach(j => {
    const c = COLOR[j.level];
    const r = j.level === 2 ? 55 : j.level === 1 ? 38 : 24;

    // Heatmap blob
    const blob = document.createElementNS('http://www.w3.org/2000/svg','circle');
    blob.setAttribute('cx', j.x);
    blob.setAttribute('cy', j.y);
    blob.setAttribute('r', r);
    blob.setAttribute('fill', c.glow.replace('rgba','radial-gradient') || c.fill);
    blob.style.fill = c.glow;
    blob.style.filter = `blur(${j.level === 2 ? 18 : 12}px)`;
    heatLayer.appendChild(blob);

    // Junction group
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('junction-ring');
    g.setAttribute('data-id', j.id);
    g.style.cursor = 'pointer';

    // Pulse ring
    const pulse = document.createElementNS('http://www.w3.org/2000/svg','circle');
    pulse.classList.add('ring-pulse');
    pulse.setAttribute('cx', j.x);
    pulse.setAttribute('cy', j.y);
    pulse.setAttribute('r', '14');
    pulse.style.stroke = c.fill;
    pulse.style.animationDelay = Math.random() * 2 + 's';

    // Outer ring
    const outer = document.createElementNS('http://www.w3.org/2000/svg','circle');
    outer.classList.add('ring-outer');
    outer.setAttribute('cx', j.x);
    outer.setAttribute('cy', j.y);
    outer.setAttribute('r', '14');
    outer.style.stroke = c.stroke;

    // Inner dot
    const inner = document.createElementNS('http://www.w3.org/2000/svg','circle');
    inner.classList.add('ring-inner');
    inner.setAttribute('cx', j.x);
    inner.setAttribute('cy', j.y);
    inner.setAttribute('r', '6');
    inner.style.fill = c.fill;

    // Label
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.classList.add('junction-label');
    text.setAttribute('x', j.x);
    text.setAttribute('y', j.y + 26);
    text.setAttribute('text-anchor','middle');
    text.style.fill = c.fill;
    text.style.fontFamily = "'Space Mono', monospace";
    text.style.fontSize = '9px';
    text.textContent = j.name;

    g.appendChild(pulse);
    g.appendChild(outer);
    g.appendChild(inner);
    g.appendChild(text);
    g.addEventListener('click', () => selectJunction(j.id));
    jLayer.appendChild(g);
  });
}

function buildAlerts() {
  const list = document.getElementById('alerts-list');
  list.innerHTML = '';
  const sorted = [...JUNCTIONS].sort((a,b) => b.level - a.level || b.vehicles - a.vehicles);
  sorted.forEach(j => {
    const c = COLOR[j.level];
    const el = document.createElement('div');
    el.className = 'alert-item';
    el.innerHTML = `
      <div class="alert-dot" style="background:${c.fill};box-shadow:0 0 6px ${c.fill}40;"></div>
      <div class="alert-info">
        <div class="alert-name">${j.name}</div>
        <div class="alert-detail">${j.vehicles} vehicles · ${j.deployed} officer${j.deployed !== 1 ? 's' : ''} deployed</div>
      </div>
      <div class="alert-tag ${c.tag}">${c.label}</div>
    `;
    el.addEventListener('click', () => selectJunction(j.id));
    list.appendChild(el);
  });
}

function updateStats() {
  document.getElementById('stat-high').textContent = JUNCTIONS.filter(j => j.level === 2).length;
  document.getElementById('stat-med').textContent  = JUNCTIONS.filter(j => j.level === 1).length;
  document.getElementById('stat-clear').textContent = JUNCTIONS.filter(j => j.level === 0).length;
  document.getElementById('stat-officers').textContent = JUNCTIONS.reduce((s,j) => s + j.deployed, 0);
}

function updateAiBanner() {
  const critical = JUNCTIONS.filter(j => j.level === 2 && j.deployed === 0)
    .sort((a,b) => b.vehicles - a.vehicles);
  if (critical.length === 0) {
    document.getElementById('ai-junction').textContent = 'All junctions stable';
    document.getElementById('ai-reason').textContent = 'No immediate deployment needed.';
    document.getElementById('ai-count').textContent = '—';
    return;
  }
  const top = critical[0];
  const rec = top.vehicles > 1000 ? 4 : top.vehicles > 700 ? 3 : 2;
  document.getElementById('ai-junction').textContent = top.name;
  document.getElementById('ai-reason').textContent =
    `${top.vehicles} vehicles queued · wait time ~${top.wait} min · no officers on site`;
  document.getElementById('ai-count').textContent = `Send ${rec} officers`;
  document.getElementById('btn-ai-deploy').onclick = () => {
    deployTo(top.id, rec);
  };
}

function selectJunction(id) {
  selectedJunction = JUNCTIONS.find(j => j.id === id);
  if (!selectedJunction) return;
  const j = selectedJunction;
  const c = COLOR[j.level];

  document.querySelectorAll('.junction-ring').forEach(el => el.classList.remove('selected'));
  document.querySelector(`[data-id="${id}"]`)?.classList.add('selected');

  document.getElementById('detail-name').textContent = j.name;
  document.getElementById('detail-vehicles').textContent = j.vehicles.toLocaleString();
  document.getElementById('detail-status').textContent = c.label;
  document.getElementById('detail-status').style.color = c.fill;
  document.getElementById('detail-deployed').textContent = j.deployed;
  document.getElementById('detail-wait').textContent = j.wait + ' min';

  document.getElementById('detail-panel').classList.add('visible');
  document.querySelector('.alerts-section').style.display = 'none';
}

document.getElementById('btn-back').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelector('.alerts-section').style.display = '';
  selectedJunction = null;
  document.querySelectorAll('.junction-ring').forEach(el => el.classList.remove('selected'));
});

document.getElementById('officer-slider').addEventListener('input', function() {
  document.getElementById('slider-val').textContent = this.value;
});

document.getElementById('btn-confirm-deploy').addEventListener('click', () => {
  if (!selectedJunction) return;
  const count = parseInt(document.getElementById('officer-slider').value);
  deployTo(selectedJunction.id, count);
  document.getElementById('btn-back').click();
});

function deployTo(id, count) {
  const j = JUNCTIONS.find(x => x.id === id);
  if (!j) return;
  j.deployed += count;
  if (j.deployed > 0 && j.level === 2) {
    j.level = 1;
    j.wait = Math.max(3, j.wait - 6);
  }
  showToast(`✓ ${count} officer${count > 1 ? 's' : ''} dispatched to ${j.name}`);
  refresh();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function refresh() {
  document.getElementById('heatmap-layer').innerHTML = '';
  document.getElementById('junction-layer').innerHTML = '';
  buildMap();
  buildAlerts();
  updateStats();
  updateAiBanner();
}

// Simulate live updates every 15s
function simulateLive() {
  setInterval(() => {
    JUNCTIONS.forEach(j => {
      const delta = Math.floor(Math.random() * 80) - 30;
      j.vehicles = Math.max(50, j.vehicles + delta);
      j.wait = Math.max(1, Math.floor(j.vehicles / 70));
    });
    refresh();
  }, 15000);
}

// Init
buildMap();
buildAlerts();
updateStats();
updateAiBanner();
simulateLive();
</script>
</body>
</html>
